services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.59.0-noble
    command: /bin/sh -c "npx -y playwright@1.59.0 run-server --port 6677 --host 0.0.0.0"
    init: true
    ipc: host
    user: pwuser
    ports:
      - "${PLAYWRIGHT_WS_PORT:-6677}:6677"

  playwright-prev:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    command: /bin/sh -c "npx -y playwright@1.58.2 run-server --port 6677 --host 0.0.0.0"
    init: true
    ipc: host
    user: pwuser
    ports:
      - "${PLAYWRIGHT_WS_PORT:-6677}:6677"
